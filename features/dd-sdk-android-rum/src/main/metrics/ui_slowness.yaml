metrics:
  - id: ui_slowness
    message: "[Mobile Metric] RUM UI Slowness"
    sampleRate: 0.75
    creationSampleRate: 100
    properties:
      metric_type:
        type: string
        const: "rum ui slowness"
      rum_ui_slowness:
        type: object
        properties:
          view_duration:
            type: long
          slow_frames:
            type: object
            properties:
              count:
                type: int
              ignored_count:
                type: int
              missed_count:
                type: int
              config:
                type: object
                properties:
                  max_count:
                    type: int
                  slow_frame_threshold:
                    type: float
                    const: 2.0
                  max_duration:
                    type: long
                  view_min_duration:
                    type: long
