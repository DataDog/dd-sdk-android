logs:
  - id: unable_to_convert_graphql_operation_type
    message: "Unable to convert [%s] to a valid graphql operation type"
    level: error
    targets:
      - maintainer
      - telemetry
    throwable: true
    message_args:
      value:
        type: string

  - id: unknown_source_for_events
    message: "You are using an unknown source %s for your events"
    level: error
    targets:
      - user
    throwable: true
    message_args:
      source:
        type: string
