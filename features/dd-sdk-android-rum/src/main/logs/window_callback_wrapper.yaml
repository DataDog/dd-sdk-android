logs:
  - id: error_processing_motion_event
    message: "Error processing MotionEvent"
    type: log
    level: error
    targets:
      - maintainer
      - telemetry
    throwable: true

  - id: received_null_motion_event
    message: "Received null MotionEvent"
    type: log
    level: error
    targets:
      - maintainer
      - telemetry

  - id: received_null_key_event
    message: "Received null KeyEvent"
    type: log
    level: error
    targets:
      - maintainer
      - telemetry

  - id: wrapped_callback_failed
    message: "Wrapped Window.Callback failed processing event"
    type: log
    level: error
    targets:
      - maintainer
    throwable: true
