logs:
  - id: negative_duration
    message: "The computed duration for your resource: %s was 0 or negative. In order to keep the resource event we forced it to 1ns."
    type: log
    level: warn
    targets:
      - user
    message_args:
      url:
        type: string

  - id: payload_truncation_failure
    message: "Failed to truncate payload"
    type: log
    level: error
    targets:
      - maintainer
    throwable: true
