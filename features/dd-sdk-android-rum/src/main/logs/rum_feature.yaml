logs:
  - id: developer_mode_sample_rate_changed
    message: "Developer mode enabled, setting RUM sample rate to 100%."
    level: info
    targets:
      - user

  - id: slow_frames_monitoring_enabled
    message: "Slow frames monitoring enabled."
    level: info
    targets:
      - user

  - id: slow_frames_monitoring_disabled
    message: "Slow frames monitoring disabled."
    level: info
    targets:
      - user

  - id: unsupported_event_type
    message: "RUM feature receive an event of unsupported type=%s."
    level: warn
    targets:
      - user
    message_args:
      event_type:
        type: string

  - id: unknown_event_type_property_value
    message: "RUM feature received an event with unknown value of \"type\" property=%s."
    level: warn
    targets:
      - user
    message_args:
      type_value:
        type: string

  - id: failed_to_get_historical_exit_reasons
    message: "Couldn't get historical exit reasons"
    level: error
    targets:
      - maintainer
    throwable: true

  - id: no_last_rum_view_event_available
    message: "No last known RUM view event found, skipping fatal ANR reporting."
    level: info
    targets:
      - user

  - id: failed_to_enable_jank_stats_tracking_manually
    message: "Manually enabling JankStats tracking threw an exception."
    level: error
    targets:
      - telemetry
    throwable: true

  - id: log_error_event_missing_mandatory_fields
    message: "RUM feature received a log event where mandatory message field is either missing or has a wrong type."
    level: warn
    targets:
      - user
      - telemetry

  - id: log_error_with_stacktrace_event_missing_mandatory_fields
    message: "RUM feature received a log event with stacktrace where mandatory message field is either missing or has a wrong type."
    level: warn
    targets:
      - user
      - telemetry
