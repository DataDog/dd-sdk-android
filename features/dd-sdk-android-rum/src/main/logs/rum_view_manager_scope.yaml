logs:
  - id: multiple_active_views
    message: "Multiple views are active at the same time, this shouldn't happen."
    type: log
    level: error
    targets:
      - maintainer

  - id: no_active_view_for_loading_time
    message: "No active view found to add the loading time."
    type: log
    level: warn
    targets:
      - user

  - id: message_missing_view
    message: "A RUM event was detected, but no view is active. To track views automatically, try calling the RumConfiguration.Builder.useViewTrackingStrategy() method.\nYou can also track views manually using the RumMonitor.startView() and RumMonitor.stopView() methods."
    type: log
    level: warn
    targets:
      - user

  - id: message_unknown_missed_type
    message: "An RUM event was detected, but no view is active, its missed type is unknown"
    type: log
    level: info
    targets:
      - maintainer
