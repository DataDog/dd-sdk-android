logs:
  - id: activity_stopped_window_not_tracked
    message: "Activity stopped but window was not tracked"
    level: warn
    targets:
      - maintainer

  - id: disabling_jank_stats_for_window
    message: "Disabling jankStats for window %s"
    level: debug
    targets:
      - maintainer
    message_args:
      window:
        type: string

  - id: jank_stats_tracking_already_disabled
    message: "Trying to disable JankStats instance which was already disabled before, this shouldn't happen."
    level: error
    targets:
      - telemetry

  - id: jank_stats_tracking_disable_error
    message: "Failed to disable JankStats tracking"
    level: error
    targets:
      - telemetry
    throwable: true

  - id: resuming_jank_stats_for_window
    message: "Resuming jankStats for window %s"
    level: debug
    targets:
      - maintainer
    message_args:
      window:
        type: string

  - id: starting_jank_stats_for_window
    message: "Starting jankStats for window %s"
    level: debug
    targets:
      - maintainer
    message_args:
      window:
        type: string

  - id: unable_to_create_jank_stats
    message: "Unable to create JankStats"
    level: warn
    targets:
      - maintainer

  - id: decor_view_null
    message: "Unable to attach JankStatsListener to window, decorView is null"
    level: warn
    targets:
      - maintainer

  - id: decor_view_not_hw_accelerated
    message: "Unable to attach JankStatsListener to window, decorView is not hardware accelerated"
    level: warn
    targets:
      - maintainer

  - id: jank_stats_listener_attach_error
    message: "Unable to attach JankStatsListener to window"
    level: error
    targets:
      - maintainer
    throwable: true

  - id: jank_stats_listener_detach_error
    message: "Unable to detach JankStatsListener to window, most probably because it wasn't attached"
    level: error
    targets:
      - maintainer
    throwable: true
