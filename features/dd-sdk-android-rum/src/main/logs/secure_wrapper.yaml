logs:
  - id: secure_setting_not_found
    message: "Setting cannot be found %s"
    level: error
    targets:
      - maintainer
    throwable: true
    message_args:
      key:
        type: string

  - id: secure_setting_security_exception
    message: "Security exception accessing %s"
    level: error
    targets:
      - maintainer
    throwable: true
    message_args:
      key:
        type: string
