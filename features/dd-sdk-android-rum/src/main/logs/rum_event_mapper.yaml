logs:
  - id: no_dropping_fatal_errors
    message: "RumEventMapper: the return from the ErrorEvent mapper was null for a crash. Dropping crashes in from the event mapper is not supported. The original event object will be used instead."
    level: warn
    targets:
      - user

  - id: no_event_mapper_assigned
    message: "RumEventMapper: there was no EventMapper assigned for RUM event type: %s"
    level: warn
    targets:
      - maintainer
      - telemetry
    message_args:
      event_type:
        type: string

  - id: view_event_null
    message: "RumEventMapper: the returned mapped ViewEvent was null. The original event object will be used instead: %s"
    level: error
    targets:
      - user
    message_args:
      event:
        type: string

  - id: event_null
    message: "RumEventMapper: the returned mapped object was null. This event will be dropped: %s"
    level: info
    targets:
      - user
    message_args:
      event:
        type: string

  - id: not_same_event_instance
    message: "RumEventMapper: the returned mapped object was not the same instance as the original object. This event will be dropped: %s"
    level: warn
    targets:
      - user
    message_args:
      event:
        type: string
