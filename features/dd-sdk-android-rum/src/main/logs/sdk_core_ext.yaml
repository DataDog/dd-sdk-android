logs:
  - id: write_operation_ignored
    message: "Write operation ignored, session is expired or RUM feature is disabled."
    level: info
    targets:
      - user

  - id: write_operation_failed
    message: "Write operation failed."
    level: error
    targets:
      - user

  - id: write_operation_failed_with_exception
    message: "Write operation failed."
    level: error
    targets:
      - user
      - telemetry
    throwable: true

  - id: no_error_callback_provided
    message: "Write operation failed, but no onError callback was provided."
    level: warn
    targets:
      - maintainer
