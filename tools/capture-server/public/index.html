<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Datadog Capture Server</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>🐕 Datadog Capture Server</h1>
    <div class="header-actions">
      <button id="refreshBtn" class="btn">↻ Refresh</button>
      <button id="clearBtn" class="btn btn-danger">🗑️ Clear All</button>
      <a href="/ui-api/export" class="btn">📥 Export</a>
    </div>
  </header>

  <main>
    <aside class="sidebar">
      <div class="stats-panel">
        <h3>Statistics</h3>
        <div id="stats">Loading...</div>
      </div>
      
      <div class="filter-panel">
        <h3>Filter</h3>
        <select id="featureFilter">
          <option value="">All Features</option>
          <option value="rum">RUM</option>
          <option value="logs">Logs</option>
          <option value="traces">Traces</option>
          <option value="session-replay">Session Replay</option>
          <option value="profiling">Profiling</option>
          <option value="feature-flags-exposures">Feature Flags (Exposures)</option>
          <option value="feature-flags-assignments">Feature Flags (Assignments)</option>
        </select>
        
        <label>
          <input type="number" id="limitFilter" value="100" min="1" max="1000">
          Max requests
        </label>
        
        <h4 style="margin-top: 1rem; font-size: 0.7rem; color: var(--text-secondary);">Event Count</h4>
        <div style="display: flex; gap: 0.5rem;">
          <label style="flex: 1;">
            <input type="number" id="minEventsFilter" min="0" placeholder="Min">
          </label>
          <label style="flex: 1;">
            <input type="number" id="maxEventsFilter" min="0" placeholder="Max">
          </label>
        </div>
      </div>
    </aside>

    <section class="content">
      <div class="requests-list" id="requestsList">
        <p class="loading">Loading requests...</p>
      </div>
      
      <div class="request-detail" id="requestDetail">
        <p class="placeholder">Select a request to view details</p>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
